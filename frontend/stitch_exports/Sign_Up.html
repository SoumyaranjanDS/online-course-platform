<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Sign Up | Luminous Learning</title>

        tailwind.config = {

                    "colors": {
                        "on-tertiary-fixed": "#2a1700",
                        "on-error": "#ffffff",

                        "tertiary": "#825100",
                        "secondary-fixed": "#6ffbbe",
                        "on-surface": "#0b1c30",
                        "on-secondary-fixed": "#002113",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-surface-variant": "#424754",
                        "on-primary-fixed-variant": "#004395",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#adc6ff",
                        "tertiary-container": "#a36700",
                        "on-tertiary-container": "#fffbff",
                        "surface-container-highest": "#d3e4fe",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "error": "#ba1a1a",
                        "surface-container-high": "#dce9ff",
                        "surface-container-low": "#eff4ff",
                        "surface": "#f8f9ff",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-variant": "#d3e4fe",
                        "surface-bright": "#f8f9ff",
                        "on-primary-fixed": "#001a42",
                        "on-error-container": "#93000a",
                        "on-background": "#0b1c30",
                        "on-primary-container": "#fefcff",
                        "inverse-on-surface": "#eaf1ff",

                        "tertiary-fixed": "#ffddb8",

                        "secondary-container": "#6cf8bb",

                    "borderRadius": {

                    "spacing": {

                        "lg": "48px",
                        "gutter": "24px",

                    },
                    "fontFamily": {

                        "display-lg": ["Plus Jakarta Sans"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],

                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "headline-sm": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .role-card-active-student {
            border-color: #0058be !important;
            background-color: #eff6ff !important;
        }
        .role-card-active-teacher {
            border-color: #006c49 !important;
            background-color: #f0fdf4 !important;
        }
        .organic-shape {
            filter: blur(40px);
            opacity: 0.4;
            z-index: 0;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-float-delayed {
            animation: float 8s ease-in-out infinite;
            animation-delay: 2s;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-stretch overflow-hidden">
<!-- Left Panel (Signup Form) -->
<div class="w-full lg:w-[45%] bg-white flex flex-col justify-center px-gutter md:px-xl relative z-10">
<div class="max-w-md w-full mx-auto space-y-xl">
<!-- Header -->
<div class="space-y-sm">
<div class="flex items-center gap-2 text-primary mb-lg">
<span class="material-symbols-outlined text-headline-sm" style="font-variation-settings: 'FILL' 1;">wb_sunny</span>
<span class="text-headline-sm font-bold tracking-tight">Luminous Learning</span>
</div>
<h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface">Start your journey with us.</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Choose how you'll use Luminous Learning.</p>
</div>
<!-- Role Selector -->
<div class="grid grid-cols-2 gap-gutter">
<!-- Student Card -->
<button class="role-card group relative text-left p-md border-[1.5px] border-outline-variant rounded-xl transition-all duration-300 hover:shadow-lg role-card-active-student" id="student-role" type="button">
<div class="flex justify-between items-start mb-base">
<span class="material-symbols-outlined text-primary text-headline-sm" data-icon="school">school</span>
<div class="bg-primary text-white rounded-full p-1 opacity-100 transition-opacity" id="student-check">
<span class="material-symbols-outlined text-[16px]">check</span>
</div>
</div>
<div class="font-label-md text-label-md text-on-surface">Student</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Learn new skills</div>
</button>
<!-- Teacher Card -->
<button class="role-card group relative text-left p-md border-[1.5px] border-outline-variant rounded-xl transition-all duration-300 hover:shadow-lg" id="teacher-role" type="button">
<div class="flex justify-between items-start mb-base">
<span class="material-symbols-outlined text-secondary text-headline-sm" data-icon="presentation_chart_line">drive_presentation_outline</span>
<div class="bg-secondary text-white rounded-full p-1 opacity-0 transition-opacity" id="teacher-check">
<span class="material-symbols-outlined text-[16px]">check</span>
</div>
</div>
<div class="font-label-md text-label-md text-on-surface">Teacher</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Share your expertise</div>
</button>
</div>
<!-- Form -->
<form class="space-y-md" id="signup-form">
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface px-1">Full Name</label>
<input class="w-full px-md py-4 rounded-xl border-[1.5px] border-outline-variant focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none font-body-md text-body-md" placeholder="Alex Johnson" required="" type="text"/>
</div>
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface px-1">Email Address</label>
<input class="w-full px-md py-4 rounded-xl border-[1.5px] border-outline-variant focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none font-body-md text-body-md" placeholder="alex@example.com" required="" type="email"/>
</div>
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface px-1">Password</label>
<input class="w-full px-md py-4 rounded-xl border-[1.5px] border-outline-variant focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none font-body-md text-body-md" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full py-4 bg-primary text-white font-label-md text-label-md rounded-xl hover:bg-primary-container active:scale-[0.98] transition-all shadow-md shadow-primary/20" id="submit-btn" type="submit">
                    Create Student Account
                </button>
</form>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log in.</a>
</p>
</div>
</div>
<!-- Right Panel (Illustration & Accents) -->
<div class="hidden lg:flex w-[55%] p-gutter items-center justify-center relative overflow-hidden bg-gradient-to-br from-surface-container-low via-surface-container-high to-secondary-container rounded-l-[32px] my-4 mr-4">
<!-- Organic Background Shapes -->
<div class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary-fixed rounded-full organic-shape"></div>
<div class="absolute bottom-[-15%] left-[-10%] w-[500px] h-[500px] bg-secondary-fixed-dim rounded-full organic-shape"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-tertiary-fixed rounded-full organic-shape"></div>
<div class="relative w-full max-w-2xl h-[600px]">
<!-- Large Illustration -->
<div class="absolute inset-0 z-20 flex items-center justify-center">
<div class="relative w-full h-full flex items-center justify-center">
<img class="w-[90%] h-auto object-contain drop-shadow-2xl" data-alt="A clean, flat-style vector illustration for a learning platform. Two diverse characters interact warmly: a male student sitting with a modern sleek laptop and a female teacher standing at a minimalist wooden podium with digital charts. The style is modern corporate, minimalist, using a light theme palette of soft blues, mint greens, and warm yellows. Soft lighting, high-end SaaS aesthetic with friendly rounded features." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0_DdTIsIsj9Jwe2kqZ2AP0_P4b_pEt4Jiac23SFzUgO0tVC9M73krY_P1W7UHl0HYe8duePZVjlEmmx0_HVO_jiiBECV8n0oAFpJz-v8aT8nIKup4jl-SwCIRR3c5N-5fj9J_x-YuKGwSpsuk1WaV2aB2O-1m5tX8wDSct2HtcXuzCXjm2CEFUtSmNAN2ucNaxNmTR8InwjRqjl8582M_g7uwMvGOot35u09rBHKo6clFXOawWyu2cIRSJpxT08mRYcQv4XmpCsM"/>
</div>
</div>
<!-- Floating Accents -->
<!-- Yellow Star Badge -->
<div class="absolute top-[15%] right-[10%] z-30 animate-float">
<div class="bg-tertiary-fixed text-on-tertiary-fixed p-sm rounded-2xl shadow-xl flex items-center gap-base">
<span class="material-symbols-outlined text-headline-sm" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-md text-label-md">Top Rated</span>
</div>
</div>
<!-- Green Checkmark Pill -->
<div class="absolute bottom-[20%] left-[5%] z-30 animate-float-delayed">
<div class="bg-secondary-container text-on-secondary-container px-md py-sm rounded-full shadow-lg flex items-center gap-base">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-md text-label-md">Verified Educators</span>
</div>
</div>
<!-- Blue Chat Bubble -->
<div class="absolute top-[40%] left-[0%] z-30 animate-float" style="animation-delay: 1s;">
<div class="bg-primary-container text-on-primary-container p-sm rounded-2xl shadow-xl flex items-center gap-base rounded-bl-none">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">forum</span>
<span class="font-label-md text-label-md">Active Community</span>
</div>
</div>
</div>
</div>
<script>
        const studentBtn = document.getElementById('student-role');
        const teacherBtn = document.getElementById('teacher-role');
        const studentCheck = document.getElementById('student-check');
        const teacherCheck = document.getElementById('teacher-check');
        const submitBtn = document.getElementById('submit-btn');

        studentBtn.addEventListener('click', () => {
            studentBtn.classList.add('role-card-active-student');
            teacherBtn.classList.remove('role-card-active-teacher');
            studentCheck.classList.replace('opacity-0', 'opacity-100');
            teacherCheck.classList.replace('opacity-100', 'opacity-0');
            submitBtn.textContent = 'Create Student Account';
            submitBtn.classList.replace('bg-secondary', 'bg-primary');
            submitBtn.classList.replace('hover:bg-on-secondary-container', 'hover:bg-primary-container');
        });

        teacherBtn.addEventListener('click', () => {
            teacherBtn.classList.add('role-card-active-teacher');
            studentBtn.classList.remove('role-card-active-student');
            teacherCheck.classList.replace('opacity-0', 'opacity-100');
            studentCheck.classList.replace('opacity-100', 'opacity-0');
            submitBtn.textContent = 'Create Teacher Account';
            submitBtn.classList.replace('bg-primary', 'bg-secondary');
            submitBtn.classList.replace('hover:bg-primary-container', 'hover:bg-on-secondary-container');
        });

        // Simple form interaction
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.textContent = 'Account Created!';
                btn.classList.add('bg-secondary');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('bg-secondary');
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });
    </script>
</body></html>
